{% extends "base.html" %}

{% block title %}{{ title }} - TMS 運輸管理系統{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">
                    <i class="fas fa-route"></i> {{ title }}
                </h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label">
                            <i class="fas fa-tag"></i> 路線名稱 <span class="text-danger">*</span>
                        </label>
                        <input type="text" class="form-control" id="name" name="name" 
                               value="{{ route.name if route else '' }}" required>
                        <div class="form-text">請輸入路線的名稱</div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="start_point" class="form-label">
                                    <i class="fas fa-play-circle text-success"></i> 起點 <span class="text-danger">*</span>
                                </label>
                                <input type="text" class="form-control" id="start_point" name="start_point" 
                                       value="{{ route.start_point if route else '' }}" required>
                                <div class="form-text">請輸入路線起點</div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="end_point" class="form-label">
                                    <i class="fas fa-stop-circle text-danger"></i> 終點 <span class="text-danger">*</span>
                                </label>
                                <input type="text" class="form-control" id="end_point" name="end_point" 
                                       value="{{ route.end_point if route else '' }}" required>
                                <div class="form-text">請輸入路線終點</div>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="waypoints" class="form-label">
                            <i class="fas fa-map-marker-alt"></i> 途經站點
                        </label>
                        <input type="text" class="form-control" id="waypoints" name="waypoints" 
                               value="{{ route.waypoints|join(', ') if route and route.waypoints else '' }}"
                               placeholder="站點1, 站點2, 站點3...">
                        <div class="form-text">請輸入途經站點，多個站點請用逗號分隔（選填）</div>
                    </div>

                    <!-- 路線預覽 -->
                    <div class="mb-3">
                        <label class="form-label">
                            <i class="fas fa-eye"></i> 路線預覽
                        </label>
                        <div id="route-preview" class="alert alert-info" style="display: none;">
                            <div id="route-display"></div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('routes_list') }}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left"></i> 返回列表
                        </a>
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-save"></i> 儲存
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const nameInput = document.getElementById('name');
    const startInput = document.getElementById('start_point');
    const endInput = document.getElementById('end_point');
    const waypointsInput = document.getElementById('waypoints');
    const routePreview = document.getElementById('route-preview');
    const routeDisplay = document.getElementById('route-display');
    
    function updateRoutePreview() {
        const name = nameInput.value.trim();
        const start = startInput.value.trim();
        const end = endInput.value.trim();
        const waypoints = waypointsInput.value.trim();
        
        if (start && end) {
            let routeText = `<strong>${name || '未命名路線'}</strong><br>`;
            routeText += `<span class="badge bg-success">${start}</span>`;
            
            if (waypoints) {
                const waypointList = waypoints.split(',').map(wp => wp.trim()).filter(wp => wp);
                waypointList.forEach(waypoint => {
                    routeText += ` → <span class="badge bg-secondary">${waypoint}</span>`;
                });
            }
            
            routeText += ` → <span class="badge bg-danger">${end}</span>`;
            
            routeDisplay.innerHTML = routeText;
            routePreview.style.display = 'block';
        } else {
            routePreview.style.display = 'none';
        }
    }
    
    nameInput.addEventListener('input', updateRoutePreview);
    startInput.addEventListener('input', updateRoutePreview);
    endInput.addEventListener('input', updateRoutePreview);
    waypointsInput.addEventListener('input', updateRoutePreview);
    
    // 初始預覽
    updateRoutePreview();
});
</script>
{% endblock %}
