{% extends "base.html" %}

{% block title %}{{ title }} - TMS 運輸管理系統{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">
                    <i class="fas fa-box"></i> {{ title }}
                </h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label">
                            <i class="fas fa-tag"></i> 貨物名稱 <span class="text-danger">*</span>
                        </label>
                        <input type="text" class="form-control" id="name" name="name" 
                               value="{{ cargo.name if cargo else '' }}" required>
                        <div class="form-text">請輸入貨物的名稱</div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="quantity" class="form-label">
                                    <i class="fas fa-hashtag"></i> 數量 <span class="text-danger">*</span>
                                </label>
                                <input type="number" class="form-control" id="quantity" name="quantity" 
                                       value="{{ cargo.quantity if cargo else '' }}" min="1" required>
                                <div class="form-text">請輸入貨物數量</div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="weight" class="form-label">
                                    <i class="fas fa-weight-hanging"></i> 單件重量 (kg) <span class="text-danger">*</span>
                                </label>
                                <input type="number" class="form-control" id="weight" name="weight" 
                                       value="{{ cargo.weight if cargo else '' }}" step="0.1" min="0" required>
                                <div class="form-text">請輸入單件貨物的重量</div>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">
                            <i class="fas fa-align-left"></i> 描述
                        </label>
                        <textarea class="form-control" id="description" name="description" rows="3" 
                                  placeholder="請輸入貨物描述（選填）">{{ cargo.description if cargo else '' }}</textarea>
                        <div class="form-text">貨物的詳細描述或備註</div>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('cargo_list') }}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left"></i> 返回列表
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> 儲存
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
// 自動計算總重量
document.addEventListener('DOMContentLoaded', function() {
    const quantityInput = document.getElementById('quantity');
    const weightInput = document.getElementById('weight');
    
    function updateTotalWeight() {
        const quantity = parseFloat(quantityInput.value) || 0;
        const weight = parseFloat(weightInput.value) || 0;
        const total = quantity * weight;
        
        // 如果總重量顯示元素不存在，創建一個
        let totalDisplay = document.getElementById('total-weight-display');
        if (!totalDisplay) {
            totalDisplay = document.createElement('div');
            totalDisplay.id = 'total-weight-display';
            totalDisplay.className = 'alert alert-info mt-2';
            weightInput.parentNode.appendChild(totalDisplay);
        }
        
        if (quantity > 0 && weight > 0) {
            totalDisplay.innerHTML = `<i class="fas fa-calculator"></i> 總重量: <strong>${total.toFixed(1)} kg</strong>`;
            totalDisplay.style.display = 'block';
        } else {
            totalDisplay.style.display = 'none';
        }
    }
    
    quantityInput.addEventListener('input', updateTotalWeight);
    weightInput.addEventListener('input', updateTotalWeight);
    
    // 初始計算
    updateTotalWeight();
});
</script>
{% endblock %}
